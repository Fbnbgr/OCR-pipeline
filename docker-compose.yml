services:
  ocr-web:
    build: .
    container_name: ocr_web
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./dict:/app/dict
      - ./src:/app/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    tty: true